<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #333;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        ul li {
            margin: 5px 0;
        }
        ul li a {
            text-decoration: none;
            color: #007BFF;
        }
        ul li a:hover {
            text-decoration: underline;
        }
        .no-results {
            color: red;
        }
        .back-link {
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>Search Results for "{{ query }}"</h1>
    {% if results %}
        <ul>
        {% for result in results %}
            <li><a href="{{ result }}" target="_blank">{{ result }}</a></li>
        {% endfor %}
        </ul>
    {% else %}
        <p class="no-results">No results found for your query.</p>
    {% endif %}
    <a class="back-link" href="/">Go back to search</a>
</body>
</html>
